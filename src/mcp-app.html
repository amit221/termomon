<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#e0e0e0;font-family:'Cascadia Code','Fira Code',Consolas,monospace;font-size:14px;padding:16px;line-height:1.5}
pre{white-space:pre-wrap;word-wrap:break-word}
</style></head><body><pre id="o">Loading...</pre><script>
var C={'30':'#1a1a2e','31':'#ff1744','32':'#00e676','33':'#ffea00',
'34':'#448aff','35':'#d500f9','36':'#00e5ff','37':'#e0e0e0',
'90':'#9e9e9e','91':'#ff1744','92':'#00e676','93':'#ffea00',
'94':'#448aff','95':'#d500f9','96':'#00e5ff','97':'#ffffff'};

function a2h(t) {
  var re = /(?:\x1b|\u001b)?\[([0-9;]*)m/g;
  var h = '', o = 0, last = 0, m;
  while ((m = re.exec(t)) !== null) {
    var before = t.slice(last, m.index);
    for (var k = 0; k < before.length; k++) {
      if (before[k] === '<') h += '&lt;';
      else if (before[k] === '>') h += '&gt;';
      else if (before[k] === '&') h += '&amp;';
      else h += before[k];
    }
    last = re.lastIndex;
    var codes = m[1].split(';');
    var s = [];
    for (var j = 0; j < codes.length; j++) {
      if (codes[j] === '0' || codes[j] === '') {
        while (o > 0) { h += '</span>'; o--; }
      } else if (codes[j] === '1') s.push('font-weight:bold');
      else if (codes[j] === '2') s.push('opacity:0.6');
      else if (C[codes[j]]) s.push('color:' + C[codes[j]]);
    }
    if (s.length > 0) { h += '<span style="' + s.join(';') + '">'; o++; }
  }
  var tail = t.slice(last);
  for (var k = 0; k < tail.length; k++) {
    if (tail[k] === '<') h += '&lt;';
    else if (tail[k] === '>') h += '&gt;';
    else if (tail[k] === '&') h += '&amp;';
    else h += tail[k];
  }
  while (o > 0) { h += '</span>'; o--; }
  return h;
}

// Poll the HTTP server for the latest tool output
function poll() {
  fetch('http://localhost:3456/api/latest-output')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.text) {
        document.getElementById('o').innerHTML = a2h(data.text);
      } else {
        setTimeout(poll, 300);
      }
    })
    .catch(function() { setTimeout(poll, 500); });
}

// Also handle postMessage in case the host does push results
window.addEventListener('message', function(ev) {
  var m = ev.data;
  if (!m || !m.jsonrpc) return;
  if (m.method === 'ui/initialize') {
    window.parent.postMessage({
      jsonrpc: '2.0', id: m.id,
      result: { protocolVersion: '2026-06-17', capabilities: {} }
    }, '*');
    return;
  }
  if (m.method === 'ui/notifications/tool-result' || m.method === 'ui/toolResult') {
    var c = m.params && (m.params.content || (m.params.result && m.params.result.content));
    if (c) {
      for (var i = 0; i < c.length; i++) {
        if (c[i].type === 'text') {
          document.getElementById('o').innerHTML = a2h(c[i].text);
          break;
        }
      }
    }
    if (m.id) window.parent.postMessage({ jsonrpc: '2.0', id: m.id, result: {} }, '*');
    return;
  }
  if (m.id) window.parent.postMessage({ jsonrpc: '2.0', id: m.id, result: {} }, '*');
});

// Start polling after a short delay (give the tool time to run)
setTimeout(poll, 200);
</script></body></html>
