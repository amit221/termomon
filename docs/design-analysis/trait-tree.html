const RARITY_COLORS = {
  common: '#9e9e9e',
  uncommon: '#4caf50',
  rare: '#2196f3',
  epic: '#9c27b0',
  legendary: '#ff9800',
  mythic: '#f44336',
  astral: '#00e5ff',
  eternal: '#ffd700'
};

const RARITY_LABELS = {
  common: 'Common', uncommon: 'Uncommon', rare: 'Rare', epic: 'Epic',
  legendary: 'Legendary', mythic: 'Mythic', astral: 'Astral', eternal: 'Eternal'
};

let currentSlot = 'eyes';
let highlightedTrait = null;

function init() {
  // Slot buttons
  const btnContainer = document.getElementById('slot-buttons');
  DATA.slots.forEach(slot => {
    const btn = document.createElement('button');
    btn.textContent = slot.charAt(0).toUpperCase() + slot.slice(1);
    btn.dataset.slot = slot;
    btn.onclick = () => { currentSlot = slot; render(); };
    btnContainer.appendChild(btn);
  });

  // Legend
  const legend = document.getElementById('legend');
  DATA.rarities.forEach(r => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    const dot = document.createElement('div');
    dot.className = 'legend-dot';
    dot.style.background = RARITY_COLORS[r];
    const label = document.createElement('span');
    label.textContent = RARITY_LABELS[r];
    item.appendChild(dot);
    item.appendChild(label);
    legend.appendChild(item);
  });

  // Stats table
  renderStats();
  render();
}

function render() {
  // Update button states
  document.querySelectorAll('.controls button').forEach(b => {
    b.classList.toggle('active', b.dataset.slot === currentSlot);
  });

  const svg = document.getElementById('tree-svg');
  svg.innerHTML = '';

  const traits = DATA.traits[currentSlot];
  const tree = DATA.tree[currentSlot];

  // Layout: each rarity is a column
  const colWidth = 140;
  const nodeHeight = 36;
  const padding = { top: 40, left: 60, right: 60, bottom: 40 };

  // Find max nodes in any column for height
  let maxNodes = 0;
  DATA.rarities.forEach(r => {
    if (traits[r]) maxNodes = Math.max(maxNodes, traits[r].length);
  });

  const colSpacing = colWidth;
  const rowSpacing = Math.max(nodeHeight + 16, 52);
  const width = padding.left + DATA.rarities.length * colSpacing + padding.right;
  const height = padding.top + maxNodes * rowSpacing + padding.bottom;

  svg.setAttribute('width', width);
  svg.setAttribute('height', height);
  svg.setAttribute('viewBox', `0 0 ${width} ${height}`);

  // Compute node positions
  const nodePositions = {};
  DATA.rarities.forEach((rarity, ri) => {
    const cols = traits[rarity] || [];
    const colX = padding.left + ri * colSpacing + colSpacing / 2;
    const totalHeight = cols.length * rowSpacing;
    const startY = padding.top + (maxNodes * rowSpacing - totalHeight) / 2;

    cols.forEach((trait, ti) => {
      nodePositions[trait.id] = {
        x: colX,
        y: startY + ti * rowSpacing + rowSpacing / 2,
        rarity,
        name: trait.name,
        id: trait.id
      };
    });
  });

  // Draw rarity column headers
  DATA.rarities.forEach((rarity, ri) => {
    const x = padding.left + ri * colSpacing + colSpacing / 2;
    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('x', x);
    text.setAttribute('y', 20);
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('fill', RARITY_COLORS[rarity]);
    text.setAttribute('font-size', '12');
    text.setAttribute('font-weight', '600');
    text.textContent = RARITY_LABELS[rarity];
    svg.appendChild(text);

    // Vertical guide line
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', x);
    line.setAttribute('y1', 28);
    line.setAttribute('x2', x);
    line.setAttribute('y2', height - padding.bottom);
    line.setAttribute('stroke', RARITY_COLORS[rarity]);
    line.setAttribute('stroke-opacity', '0.1');
    line.setAttribute('stroke-width', '1');
    svg.appendChild(line);
  });

  // Draw connections (edges)
  const edgeGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  edgeGroup.setAttribute('id', 'edges');
  svg.appendChild(edgeGroup);

  Object.entries(tree).forEach(([fromId, data]) => {
    const from = nodePositions[fromId];
    if (!from) return;

    Object.entries(data.connections).forEach(([toId, weight]) => {
      const to = nodePositions[toId];
      if (!to) return;

      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      const midX = (from.x + to.x) / 2;
      const d = `M ${from.x + 50} ${from.y} C ${midX} ${from.y}, ${midX} ${to.y}, ${to.x - 50} ${to.y}`;
      path.setAttribute('d', d);
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke', RARITY_COLORS[data.toRarity]);
      path.setAttribute('stroke-width', Math.max(1, weight * 6));
      path.setAttribute('stroke-opacity', Math.max(0.15, weight * 0.7));
      path.dataset.from = fromId;
      path.dataset.to = toId;
      path.dataset.weight = weight;
      path.classList.add('edge');
      edgeGroup.appendChild(path);
    });
  });

  // Draw nodes
  const nodeGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  nodeGroup.setAttribute('id', 'nodes');
  svg.appendChild(nodeGroup);

  Object.entries(nodePositions).forEach(([id, pos]) => {
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.classList.add('node');
    g.dataset.id = id;
    g.style.cursor = 'pointer';

    // Node background
    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', pos.x - 48);
    rect.setAttribute('y', pos.y - 14);
    rect.setAttribute('width', 96);
    rect.setAttribute('height', 28);
    rect.setAttribute('rx', 6);
    rect.setAttribute('fill', '#161b22');
    rect.setAttribute('stroke', RARITY_COLORS[pos.rarity]);
    rect.setAttribute('stroke-width', '1.5');
    g.appendChild(rect);

    // Node label
    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('x', pos.x);
    text.setAttribute('y', pos.y + 4);
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('fill', '#c9d1d9');
    text.setAttribute('font-size', '10');
    // Truncate name if too long
    const displayName = pos.name.length > 12 ? pos.name.slice(0, 11) + '\u2026' : pos.name;
    text.textContent = displayName;
    g.appendChild(text);

    // Event handlers
    g.addEventListener('mouseenter', (e) => showTooltip(e, id, pos));
    g.addEventListener('mouseleave', hideTooltip);
    g.addEventListener('click', () => toggleHighlight(id));

    nodeGroup.appendChild(g);
  });

  // Apply highlight if any
  applyHighlight();
}

function showTooltip(event, traitId, pos) {
  const tooltip = document.getElementById('tooltip');
  const tree = DATA.tree[currentSlot];

  let html = `<div class="tt-name">${pos.name}</div>`;
  html += `<div class="tt-rarity" style="color:${RARITY_COLORS[pos.rarity]}">${RARITY_LABELS[pos.rarity]}</div>`;

  // Outgoing connections
  if (tree[traitId]) {
    html += `<div class="tt-connections"><strong>Upgrades to:</strong>`;
    const sorted = Object.entries(tree[traitId].connections).sort((a,b) => b[1] - a[1]);
    sorted.forEach(([toId, weight]) => {
      const toName = findTraitName(toId);
      const pct = (weight * 100).toFixed(0);
      const barWidth = Math.round(weight * 80);
      html += `<div class="tt-conn-item"><span class="tt-bar" style="width:${barWidth}px;background:${RARITY_COLORS[tree[traitId].toRarity]}"></span>${toName} (${pct}%)</div>`;
    });
    html += `</div>`;
  }

  // Incoming connections
  const incoming = [];
  Object.entries(tree).forEach(([fromId, data]) => {
    if (data.connections[traitId]) {
      incoming.push({ fromId, weight: data.connections[traitId], fromRarity: data.fromRarity });
    }
  });
  if (incoming.length > 0) {
    html += `<div class="tt-connections" style="margin-top:6px"><strong>Upgraded from:</strong>`;
    incoming.sort((a,b) => b.weight - a.weight);
    incoming.forEach(({ fromId, weight, fromRarity }) => {
      const fromName = findTraitName(fromId);
      const pct = (weight * 100).toFixed(0);
      const barWidth = Math.round(weight * 80);
      html += `<div class="tt-conn-item"><span class="tt-bar" style="width:${barWidth}px;background:${RARITY_COLORS[fromRarity]}"></span>${fromName} (${pct}%)</div>`;
    });
    html += `</div>`;
  }

  tooltip.innerHTML = html;
  tooltip.style.opacity = '1';

  // Position near cursor
  const rect = document.getElementById('canvas-container').getBoundingClientRect();
  let left = event.clientX + 16;
  let top = event.clientY - 10;
  if (left + 260 > window.innerWidth) left = event.clientX - 270;
  if (top + 200 > window.innerHeight) top = event.clientY - 200;
  tooltip.style.left = left + 'px';
  tooltip.style.top = top + 'px';
}

function hideTooltip() {
  document.getElementById('tooltip').style.opacity = '0';
}

function findTraitName(id) {
  for (const rarity of DATA.rarities) {
    const traits = DATA.traits[currentSlot][rarity] || [];
    const found = traits.find(t => t.id === id);
    if (found) return found.name;
  }
  return id;
}

function toggleHighlight(traitId) {
  highlightedTrait = highlightedTrait === traitId ? null : traitId;
  applyHighlight();
}

function applyHighlight() {
  const svg = document.getElementById('tree-svg');
  const edges = svg.querySelectorAll('.edge');
  const nodes = svg.querySelectorAll('.node');

  if (!highlightedTrait) {
    edges.forEach(e => { e.style.opacity = ''; });
    nodes.forEach(n => { n.style.opacity = ''; });
    return;
  }

  // Find all connected traits (upstream and downstream)
  const connected = new Set([highlightedTrait]);
  const tree = DATA.tree[currentSlot];

  // Downstream (from highlighted)
  function findDownstream(id) {
    if (tree[id]) {
      Object.keys(tree[id].connections).forEach(toId => {
        connected.add(toId);
        findDownstream(toId);
      });
    }
  }

  // Upstream (to highlighted)
  function findUpstream(id) {
    Object.entries(tree).forEach(([fromId, data]) => {
      if (data.connections[id]) {
        connected.add(fromId);
        findUpstream(fromId);
      }
    });
  }

  findDownstream(highlightedTrait);
  findUpstream(highlightedTrait);

  // Dim non-connected
  edges.forEach(e => {
    const isConn = connected.has(e.dataset.from) && connected.has(e.dataset.to);
    e.style.opacity = isConn ? '' : '0.05';
  });
  nodes.forEach(n => {
    n.style.opacity = connected.has(n.dataset.id) ? '' : '0.2';
  });
}

function renderStats() {
  const stats = document.getElementById('stats');
  const bp = DATA.balanceParams;

  let html = '<h3 style="color:#58a6ff;margin-bottom:10px">Balance Parameters</h3>';
  html += '<table>';
  html += '<tr><th>Rarity</th><th>Stars</th><th>Jump Merges</th><th>Star Rate</th><th>Jump Rate</th><th>Pity</th><th>Catches/Merge</th></tr>';
  DATA.rarities.forEach(r => {
    html += `<tr style="color:${RARITY_COLORS[r]}">`;
    html += `<td>${RARITY_LABELS[r]}</td>`;
    html += `<td>${bp.starsPerRarity[r]}</td>`;
    html += `<td>${bp.jumpMerges[r] || '-'}</td>`;
    html += `<td>${(bp.baseSuccessRates[r]*100).toFixed(0)}%</td>`;
    html += `<td>${bp.jumpBaseRates[r] ? (bp.jumpBaseRates[r]*100).toFixed(0)+'%' : '-'}</td>`;
    html += `<td>${bp.pityThresholds[r]}</td>`;
    html += `<td>${bp.catchesPerMergeAttempt[r]}</td>`;
    html += `</tr>`;
  });
  html += '</table>';

  html += '<p style="margin-top:12px">Click a trait node to highlight its full upgrade path. Hover for connection details.</p>';
  stats.innerHTML = html;
}

// Load data and initialize
document.addEventListener('DOMContentLoaded', init);
