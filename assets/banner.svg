<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 200" font-family="'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace">
  <defs>
    <style>
      .bg { fill: #1a1a1a; }
      .common { fill: #6e7681; }
      .rare { fill: #58a6ff; }
      .epic { fill: #bc8cff; }
      .legendary { fill: #d29922; }
      .mythic { fill: #f85149; }
      .white { fill: #c9d1d9; }
      .name { fill: #e6edf3; font-weight: bold; }
    </style>
  </defs>
  <rect class="bg" width="780" height="200" rx="6"/>
  <!-- Nub - common -->
  <g transform="translate(50, 10)" text-anchor="middle" font-size="15">
    <text y="24" class="common">○.○</text>
    <text y="48" class="common">( ~ )</text>
    <text y="72" class="common">╱ ░░ ╲</text>
    <text y="96" class="common">~~/</text>
    <text y="130" class="name" font-size="15">Nub</text>
    <text y="150" class="common" font-size="11">common</text>
  </g>
  <!-- Drift - rare -->
  <g transform="translate(220, 10)" text-anchor="middle" font-size="15">
    <text y="24" class="rare">◎.◎</text>
    <text y="48" class="white">( ∘ )</text>
    <text y="72" class="rare">╱ ▓▓ ╲</text>
    <text y="96" class="white">⌇⌇</text>
    <text y="130" class="name" font-size="15">Drift</text>
    <text y="150" class="rare" font-size="11">rare</text>
  </g>
  <!-- Vortex - epic -->
  <g transform="translate(390, 10)" text-anchor="middle" font-size="15">
    <text y="24" class="epic">◆.◆</text>
    <text y="48" class="rare">( ω )</text>
    <text y="72" class="epic">╱ ◆◆ ╲</text>
    <text y="96" class="legendary">☄☄</text>
    <text y="130" class="name" font-size="15">Vortex</text>
    <text y="150" class="epic" font-size="11">epic</text>
  </g>
  <!-- Lumina - legendary -->
  <g transform="translate(560, 10)" text-anchor="middle" font-size="15">
    <text y="24" class="legendary">★w★</text>
    <text y="48" class="legendary">( ◇ )</text>
    <text y="72" class="rare">╱ ▓▓ ╲</text>
    <text y="96" class="rare">≋≋</text>
    <text y="130" class="name" font-size="15">Lumina</text>
    <text y="150" class="legendary" font-size="11">legendary</text>
  </g>
  <!-- Aurion - mythic -->
  <g transform="translate(730, 10)" text-anchor="middle" font-size="15">
    <text y="24" class="mythic">⊙_⊙</text>
    <text y="48" class="mythic">( ⊗ )</text>
    <text y="72" class="mythic">╱ ◈◈ ╲</text>
    <text y="96" class="mythic">☄✧☄</text>
    <text y="130" class="name" font-size="15">Aurion</text>
    <text y="150" class="mythic" font-size="11">mythic</text>
  </g>
</svg>
